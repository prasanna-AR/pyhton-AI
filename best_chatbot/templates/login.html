<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Study Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .auth-box {
            background: rgba(20, 22, 26, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .auth-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .auth-box h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(35, 39, 47, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(107, 76, 255, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(107, 76, 255, 0.4);
        }

        .auth-links {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .flash.error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .flash.success {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <span class="auth-icon">🤝</span>
            <h2>Welcome Back</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="flash-messages">
                {% for category, message in messages %}
                  <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="study@buddy.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <!-- Simple remember me visual -->
                <div class="input-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember" style="width: auto;">
                    <label for="remember" style="margin: 0; cursor: pointer;">Remember me</label>
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
            </div>
        </div>
    </div>
</body>
</html>
